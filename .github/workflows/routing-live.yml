name: Routing Live (PR + post-merge)

on:
  pull_request:
    branches: [main]
    paths:
      - "app/cli/interactive_shell/routing/**"
      - "app/cli/interactive_shell/chat/**"
      - "app/cli/interactive_shell/runtime/**"
      - "app/cli/interactive_shell/commands.py"
      - "app/core/runtime/**"
      - "tests/cli/interactive_shell/routing/**"
      - "pytest.ini"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/routing-live.yml"
  push:
    branches: [main]
    paths:
      - "app/cli/interactive_shell/routing/**"
      - "app/cli/interactive_shell/chat/**"
      - "app/cli/interactive_shell/runtime/**"
      - "app/cli/interactive_shell/commands.py"
      - "app/core/runtime/**"
      - "tests/cli/interactive_shell/routing/**"
      - "pytest.ini"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/routing-live.yml"
  workflow_dispatch:
    inputs:
      shard_indexes:
        description: "Comma-separated shard indexes to run (0-7)"
        required: false
        default: "0,1,2,3,4,5,6,7"

permissions:
  contents: read

concurrency:
  group: routing-live-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  routing-checks:
    name: routing-checks (no-LLM)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      OPENSRE_DISABLE_KEYRING: "1"
      PYTHONUTF8: "1"

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Deterministic routing + fixture integrity
        run: >-
          uv run python -m pytest -n auto -v
          app/cli/interactive_shell/routing/tests/
          -m "not live_llm"

  routing-live:
    # Run on push to main, manual dispatch, and same-repo PRs. Fork PRs have no
    # secrets, so they skip the live job (the no-LLM routing-checks job above
    # still gates them) instead of failing the credential-validation step.
    if: >-
      github.repository == 'Tracer-Cloud/opensre' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
    name: routing-live shard ${{ matrix.shard_index }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard_index: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('[{0}]', github.event.inputs.shard_indexes) || '[0, 1, 2, 3, 4, 5, 6, 7]') }}

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LLM_PROVIDER: openai
      OPENSRE_DISABLE_KEYRING: "1"
      ROUTING_SHARD_TOTAL: "8"
      ROUTING_SHARD_INDEX: ${{ matrix.shard_index }}
      PYTHONUTF8: "1"
      # Live-data routing scenarios (e.g. 316) resolve a real Sentry integration
      # from these env vars and assert the gather loop returns valid data. Only
      # the token is a secret; org/project/url are non-sensitive. When the secret
      # is absent (e.g. fork PRs) the scenario SKIPS rather than fails, so this is
      # additive and never breaks the suite.
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG_SLUG: tracer-30
      SENTRY_PROJECT_SLUG: python
      SENTRY_URL: https://sentry.io
      # Optional: live-gather incident scenarios (333–335) resolve real Datadog
      # credentials. When absent the scenarios skip (no DD_API_KEY/DD_APP_KEY).
      DD_API_KEY: ${{ secrets.DD_API_KEY }}
      DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
      DD_SITE: datadoghq.com
      GRAFANA_READ_TOKEN: ${{ secrets.GRAFANA_READ_TOKEN }}
      GRAFANA_INSTANCE_URL: ${{ secrets.GRAFANA_INSTANCE_URL }}

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Validate live LLM credential wiring
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::error::OPENAI_API_KEY is missing for live routing tests."
            exit 1
          fi

      - name: Run sharded live routing suite
        run: >-
          uv run python -m pytest -n auto -v
          -m live_llm
          app/cli/interactive_shell/routing/tests/test_routing_scenarios.py
          -k "test_live_turn_execution_oracle or test_live_action_planning"
