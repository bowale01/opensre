# Cloud-OpsBench — DB-evidence pipeline FULL-N (n=452, three-arm, gpt-4o).
#
# Experiment ID: ``exp_db_evidence_pipeline_v1`` (full-N phase)
#
# Pre-registration: ./preregistration.yml (co-located in this
# experiment folder; framework integrity gate enforces the link).
#
# What's being tested
# ===================
# V2 prompt with both structural rules:
#   M1 — Dependency-traversal rule (Layer 1): query DB / cache / queue pod
#        logs when the failing service shows connection-shaped errors.
#   M2 — Alert-anchored upstream-attribution rule: trust the alert's
#        named service on performance / latency / network / resource
#        alerts; downstream noisy logs are usually victims, not causes.
#
# Predictor: default (NOT structured outputs — that variant was rejected
# 2026-06-10 in exp_structured_outputs_v1).
#
# Why now: three smoke runs at n=25 showed an 11pp swing across runs of
# identical input. The smoke noise floor exceeds prompt-level effect
# sizes. Full-N (n_scen=452) is the only way to resolve whether V2's
# apparent Performance lift (smoke v2: opensre 0.493) and the Admission
# win (joint smoke: +33.3pp SIG) hold at proper scale.
#
# RUN — ON AWS FARGATE ONLY (transparency policy):
#   1. git push the branch (image SHA → provenance.json)
#   2. gh workflow run "Benchmark image — build + push to ECR" --ref <branch>
#   3. gh workflow run "Benchmark image — promote" --ref <branch> -f image_tag=<sha>
#   4. gh workflow run "Benchmark — run on Fargate" --ref <branch> \
#        -f config="tests/benchmarks/cloudopsbench/configs/experiments/exp_db_evidence_pipeline/full_n.yml" \
#        -f dev_mode=false
#
# dev_mode=false is REQUIRED for this run. This is the promotable cycle:
# the integrity gate must enforce the committed pre-reg + a real
# opensre_sha (not "(no-git)"). If dev_mode=true is used by accident, the
# resulting numbers are NOT promotable to a baseline.
#
# Cost: ~$65 expected (anchored to perf-only smoke at $0.016/cell × 4068
# cells). Budget set to $120 (raised from $80 after the 2026-06-11T21-03Z
# run aborted at 66% completion). The cells we did complete suggest the
# per-cell cost was within estimate; the abort was wall-budget-bounded,
# not per-cell-cost-bounded. The extra $40 of headroom prevents the same
# mid-run cutoff while still capping liability.
# Wall time: ~3.5h Fargate at workers=4 (parallelism per BENCH infra
# defaults; framework auto-scales within ECS task definition limits).
#
# Decision matrix (locked in the pre-reg, copied here for visibility):
#   SHIP if ALL hold:
#     - Aggregate a1 paired Δ ≥ +0.03
#     - Admission a1 ≥ 0.35 AND paired Δ ≥ +0.10
#     - Performance a1 ≥ 0.40 AND paired Δ ≥ -0.10
#     - Generalization gate held-out lift / optimize lift ≥ 0.70
#   ROLL BACK + pivot if Admission OR Performance fails.

benchmark: cloudopsbench

modes:
  - opensre+llm
  - llm_alone
  - llm_alone_pure

llms:
  - gpt-4o

model_versions:
  gpt-4o: gpt-4o-2024-11-20

runs_per_case: 3
workers: 4
cost_budget_usd: 120.0
seed: 42

output_dir: .bench-results/cloudopsbench_db_evidence_pipeline_full_openai/

# Pre-reg pinned. Integrity gate validates content + opensre_sha at
# pre-flight; rejects the run if anything has drifted since commit.
pre_registration_path: tests/benchmarks/cloudopsbench/configs/experiments/exp_db_evidence_pipeline/preregistration.yml

filters:
  # Full corpus — no limit, no system filter, no fault_category filter.
  # seen_shape=[true, false] forces both strata to run; the runner
  # applies the held-out 20% / optimize 80% split set by held_out_seed
  # in the pre-reg.
  limit: null
  seen_shape: [true, false]
  systems: []
  fault_categories: []

# Floor=0 + trimmed prompt — matches the bench image's current default
# and the smoke chain's configuration. Same agent path, same predictor
# path; only the case slice changes from smoke (25 / 40) to full (452).
min_tool_calls: 0
agent_variant: trimmed_prompt
predictor_variant: default

report_formats:
  - json
  - markdown
