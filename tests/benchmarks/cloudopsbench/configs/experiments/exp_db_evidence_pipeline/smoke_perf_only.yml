# Cloud-OpsBench — Performance-only smoke (Performance category isolated,
# three-arm). Cost-efficient diagnostic for the regression seen in the
# preceding DB-evidence pipeline smoke.
#
# Experiment ID: ``exp_perf_only_diagnostic`` (smoke phase, post-hoc)
#
# WHY THIS SMOKE EXISTS
# =====================
# The 2026-06-11 DB-evidence pipeline smoke
# (``cloudopsbench_db_pod_logs_smoke_openai``, run
# ``dev-2026-06-11T11-02-51Z``) showed a real signal that we want to
# resolve before committing $65 + 3.5h to a full-N:
#
#   Aggregate a1 (n=120 per arm, 40 cases × 3 runs):
#     opensre+llm = 0.575
#     llm_alone   = 0.550 (paired Δ +0.025, ns at smoke scale)
#
#   By category (paired Δ, opensre+llm − llm_alone, scenario-clustered):
#     Admission     +0.333  (n_scen=7,  SIG, CI [+0.143, +0.571])
#     Performance   −0.148  (n_scen=9,  ns,  CI [−0.370, +0.037])
#     Runtime        0.000  (n_scen=14, ns)
#     Startup        0.000  (n_scen=10, ns)
#
# The Admission win is large and significant. The Performance arm LOST
# ground (point estimate −14.8pp), and although the CI includes zero at
# n=9 scenarios, the magnitude is concerning. If the regression hardens at
# full-N (n=68 Performance scenarios in the full corpus), it cancels the
# Admission win and produces a flat or negative aggregate — a bad outcome
# for the workstream.
#
# Cheaper to resolve at smoke scale (~$3-4) than to find out at full-N
# (~$65). This config isolates Performance with more scenarios than the
# joint smoke could give it (40 cases stratified across 4 categories left
# only 9 unique Performance cases).
#
# HYPOTHESES (committed BEFORE the run)
# ======================================
#   H_null:  The −14.8pp Performance gap was noise at n=9. With ≥20
#            Performance scenarios at smoke scale, opensre+llm Performance
#            a1 will be within ±5pp of llm_alone Performance a1.
#
#   H_alt:   The Performance regression is real. With ≥20 scenarios,
#            opensre+llm Performance a1 will be ≥10pp BELOW llm_alone
#            Performance a1, and the CI will exclude zero (or come close).
#
# Mechanism if H_alt: the Layer 1 planner rule ("when failing service
# shows connection-related errors, also call GetErrorLogs on the
# dependency pod") may be misfiring on Performance scenarios. The cell
# inspection in the prior smoke showed Layer 1 fired on 15% of ALL cells
# (not just DB cases) — so over-fire onto non-DB Performance cases is
# plausible. Other mechanisms: the trimmed-prompt agent's investigation
# may be terminating too early on perf-load scenarios where the alert
# itself is the diagnosis.
#
# DECISION MATRIX (locked BEFORE the run)
# ========================================
# Outcome on Performance category:
#   A. opensre+llm − llm_alone ≥ +0.00 (no regression) → PROCEED to full-N
#       confidently. The joint smoke's apparent Performance loss was noise.
#   B. −0.05 < Δ < 0.00 (small loss, within margin) → PROCEED to full-N,
#       but note this as a category to watch in the full-N report.
#   C. −0.15 < Δ ≤ −0.05 (meaningful loss) → DIAGNOSE before full-N.
#       Sample 5 Performance cells, inspect tool sequences. Likely fixes:
#       (a) tighten Layer 1 trigger to avoid Performance over-fire,
#       (b) revert Layer 1 on Performance scenarios specifically,
#       (c) add a Performance-specific planner guard.
#   D. Δ ≤ −0.15 (regression hardens) → DO NOT proceed to full-N. The
#       Layer 1 rule is hurting more than the Admission lift helps.
#       Either rework the trigger or roll back Layer 1 from the pipeline.
#
# Aggregate gate (secondary, for cost-efficiency):
#   - If gate C/D fires, no full-N. Save $65.
#   - If gate A/B fires, full-N + pre-reg.
#
# RUN — ON AWS FARGATE ONLY (no local runs; transparency policy):
#   1. (image already built, dual-layer pipeline lives in image SHA 6a92295
#      via the prior smoke — re-use same image; no rebuild needed)
#   2. gh workflow run "Benchmark — run on Fargate" --ref <branch> \
#        -f config="tests/benchmarks/cloudopsbench/configs/cloudopsbench_perf_only_smoke_openai.yml" \
#        -f dev_mode=true
#
# Why dev_mode=true: this is the same exploratory-pilot regime as the
# preceding smoke. No matching pre-reg has been committed for the
# Performance-isolate experiment (and won't be — this is a category-scoped
# diagnostic, not a separate publishable hypothesis). The pre_registration_path
# below remains the placeholder cloudopsbench_v1.yml so the integrity gate
# checks for SOMETHING but the dev flag tells it not to enforce match.
#
# COST + WALL TIME
# =================
# Anchored to the preceding smoke's measured per-cell rate:
#   Joint smoke: 720 LLM calls, 360 cells, $5.72 → ~$0.016/cell
#   This smoke: 25 cases × 3 runs × 3 arms = 225 cells → ~$3.60 expected.
#   Wall time at workers=1: ~45 min (Performance cases tend to have longer
#   investigations than Startup; scale up slightly from the joint smoke's
#   73 min/360 cells rate).
#
# WHAT THIS SMOKE WILL NOT TELL US
# =================================
#   - Whether Layer 2 (B1 rerank) fired. The artifact format doesn't
#     capture the handoff log line; we can only observe the input/output.
#     B1 detection requires a sample-level manual inspection that this
#     diagnostic does not attempt.
#   - Whether the Admission +33pp finding holds at higher scale. That
#     remains the topic of the eventual full-N.
#   - The exact mechanism of any Performance regression. We get a
#     direction + magnitude; root-causing the trigger comes after.

benchmark: cloudopsbench

modes:
  - opensre+llm
  - llm_alone
  - llm_alone_pure

llms:
  - gpt-4o

model_versions:
  gpt-4o: gpt-4o-2024-11-20

runs_per_case: 3
workers: 1
cost_budget_usd: 10.0
seed: 42

output_dir: .bench-results/cloudopsbench_perf_only_smoke_openai/

# Placeholder pre-reg (per BDIL Phase 0: pilot is exploratory; full-N
# requires a real pre-reg). dev_mode=true on the workflow call lets the
# integrity gate accept the placeholder.
pre_registration_path: tests/benchmarks/cloudopsbench/configs/preregistrations/cloudopsbench_v1.yml

filters:
  # 25 Performance scenarios — enough to bring scenario-clustered CIs
  # under ±10pp on the paired Δ. The full corpus has 68 Performance cases
  # (paper Table 2), so 25 is ~37% of available Performance — generous for
  # smoke scale.
  limit: 25
  seen_shape: [true, false]
  systems: []
  fault_categories:
    - performance

# Floor=0 + trimmed prompt — matches the bench image's current default
# and the preceding smoke's configuration. Same agent path, same
# predictor path — only the case slice changes.
min_tool_calls: 0
agent_variant: trimmed_prompt
predictor_variant: default

report_formats:
  - json
  - markdown
