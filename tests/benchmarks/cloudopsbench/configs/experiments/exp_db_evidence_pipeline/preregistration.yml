# Pre-registration — exp_db_evidence_pipeline_v1 (V2 prompt: dependency-
# traversal rule + alert-anchored upstream-attribution rule, default
# predictor, full 452-case corpus)
#
# COMMIT THIS BEFORE THE RUN. Locks the predictions, decision rules, and
# overfit guards in place so the result is interpretable regardless of
# which direction the data goes. Schema mirrors
# ``exp_structured_outputs_v1.yml`` so the framework's IntegrityGuard can
# validate it the same way.
#
# Scope: this is the headline full-N for the DB-evidence pipeline
# workstream (#2074). It tests opensre+llm with the V2 trimmed prompt
# (two structural rules: dependency-traversal for connection-shaped
# alerts; alert-anchored upstream-attribution for performance-shaped
# alerts). The default predictor — NOT structured outputs (that variant
# was rejected 2026-06-10 in its own pre-reg).
#
# Why V2 and not V3:
#   Performance smoke chain (2026-06-11): V1 0.427 → V2 0.493 → V3 0.387.
#   V3 added a root-cause-shape-consistency clause that regressed below
#   V1. Three runs of identical 25-case input gave an 11pp swing across
#   runs — the noise floor at smoke scale is larger than any prompt-level
#   effect. V2's mid-run score (0.493) is the best opensre+llm observed
#   and its rule is structurally sensible (alert is the supervised
#   signal; trust it). V3 is reverted. The full-N at n=452 is the only
#   way to resolve whether V2's apparent lift is real or noise.

cycle: exp-db-evidence-pipeline-v1-2026-06-11

# --------------------------------------------------------------------------- #
# Target corpus + version pinning — all values confirmed at commit time       #
# --------------------------------------------------------------------------- #
target_corpus:
  benchmark: cloudopsbench
  hf_dataset: tracer-cloud/cloud-ops-bench-dataset
  hf_revision: ce0ded4f196f01e176cf1d69ec15c2db42b2a677
  paper: arXiv:2603.00468v1
  case_count: 452
# Stamped into provenance.json at run time from the OPENSRE_SHA env var
# (built into the bench image from github.sha via the benchmark-image
# workflow). The runtime integrity gate (BenchmarkRunner.run() in
# runner.py) rejects any value that is not a 7-40 lowercase hex SHA, so
# this field cannot be silently bypassed with a placeholder or arbitrary
# string. Leaving as an explicit note prevents reviewers from mistaking
# the previous ``REPLACE_AT_COMMIT_TIME`` literal for a real identifier.
opensre_sha: "(stamped-at-run-time-from-OPENSRE_SHA-env-var)"
framework_version: 0.1.0

# --------------------------------------------------------------------------- #
# Mechanisms under test                                                       #
# --------------------------------------------------------------------------- #
mechanisms:
  - id: M1
    name: dependency-traversal rule (Layer 1)
    where: bench_agent.py:_TRIMMED_BENCH_SYSTEM_PROMPT
    description: |
      When the failing service shows connection-related errors (refused,
      timeout, auth failure, write failure, port unreachable), call
      GetErrorLogs on the stateful dependency pod (DB / cache / queue) too
      — those pods log their own internal failure modes that are invisible
      from the caller. Investigation-layer only; does not bias localization.
  - id: M2
    name: alert-anchored upstream-attribution rule
    where: bench_agent.py:_TRIMMED_BENCH_SYSTEM_PROMPT
    description: |
      When the alert names a specific service AND describes a performance /
      latency / network / resource-saturation problem, treat the
      alert-named service as the primary suspect. A slow upstream often
      produces noisy logs in downstream services (timeouts, retries,
      'cannot reach upstream'); those downstream services are usually
      victims, not causes. Investigate the named service's pod-level
      metrics (CPU, memory, network), not the loud downstream logs.

# --------------------------------------------------------------------------- #
# Comparison protocol                                                         #
# --------------------------------------------------------------------------- #
comparison_protocol:
  primary_contrast: "opensre+llm vs llm_alone (same model_version, same tool surface)"
  external_reference: "paper Table 4 Base; paper Table 5 ICL (report both)"
  headline_aggregation: mean
  headline_stratum: single-shot
  triple_match_required: true
  ceiling_caveat: "paper ICL (GPT-4o 0.70) is the cost-equivalent baseline to beat, not Base 0.49"

# --------------------------------------------------------------------------- #
# Statistical power                                                           #
# --------------------------------------------------------------------------- #
statistical_power:
  independent_unit: scenario
  alpha: 0.05
  power: 0.80
  min_scenarios_for_ship: 452
  pilot_is_exploratory: true
  ci_method: scenario-clustered bootstrap (2000 resamples)

# --------------------------------------------------------------------------- #
# Provenance requirements                                                     #
# --------------------------------------------------------------------------- #
provenance_requirements:
  committed_checkout_required: true
  dev_mode_forbidden_for_baseline: true
  prereg_sha_pinned_in_report: true
  model_version_pinned: true

# --------------------------------------------------------------------------- #
# Per-stratum hypotheses (committed BEFORE seeing full-N data)                #
# --------------------------------------------------------------------------- #
# Predictions anchored to actual smoke data:
#   Joint DB-evidence smoke (n=40, 2026-06-11):
#     Admission: opensre 0.524 vs llm_alone 0.190, paired Δ +33.3pp SIG (n_scen=7)
#     Performance: opensre 0.481 vs llm_alone 0.630, paired Δ -14.8pp ns (n_scen=9)
#     Runtime: opensre 0.524 vs llm_alone 0.524, paired Δ 0pp ns (n_scen=14)
#     Startup: opensre 0.767 vs llm_alone 0.767, paired Δ 0pp ns (n_scen=10)
#   Performance-only V2 smoke (n=25, 2026-06-11T16-08-59Z):
#     Performance: opensre 0.493 vs llm_alone 0.560, paired Δ -6.7pp ns (n_scen=25)
#
# Hypothesis: at full-N (n_scen=452), point estimates will regress toward
# their true mechanism effect; CIs will tighten enough to call significance
# on the larger effects (Admission win, possibly Performance loss).

hypotheses:
  - id: H_admission
    stratum: Admission
    paper_a1: "< 0.36 (universal weak spot per paper Table 4)"
    smoke_observation: "opensre +33.3pp vs llm_alone (n_scen=7, CI [+14.3, +57.1])"
    target_lift: 0.20
    target_a1_opensre: 0.40
    rationale: |
      The Admission win is mechanism-driven: opensre's planner asks the
      namespace directly about its quotas (DescribeResource(namespace, X))
      instead of chasing service-level error logs. Confirmed in cell-level
      sampling. Full-N regression toward +20pp accounts for the small-n
      upward bias of the smoke.
    confidence: 0.75

  - id: H_performance
    stratum: Performance
    paper_a1: "< 0.36 (universal weak spot)"
    smoke_observation: "joint smoke -14.8pp (n_scen=9); V2 smoke -6.7pp (n_scen=25)"
    target_lift: -0.05
    target_a1_opensre: 0.45
    rationale: |
      Two smokes showed a Performance gap with opposite-direction stability
      (joint -14.8pp vs V2 -6.7pp; difference within noise). The V2
      alert-anchored rule is mechanism-driven and partially fixed the
      Performance → Runtime confusion pattern in cell inspection. Full-N
      will reveal whether the V2 rule recovers Performance to near-tied or
      whether the regression hardens.
    confidence: 0.40

  - id: H_runtime
    stratum: Runtime
    paper_a1: "0.49 (gpt-4o Table 4)"
    smoke_observation: "tied at 0.524 (n_scen=14, CI [-16.7, +16.7])"
    target_lift: 0.00
    target_a1_opensre: 0.52
    rationale: |
      Tied in the smoke. Runtime alerts are diverse (probe failures, OOM,
      image pull, etc.); no single mechanism in V2 specifically targets
      Runtime. Expected to remain near-tied at full-N.
    confidence: 0.60

  - id: H_startup
    stratum: Startup
    paper_a1: "(stratum-specific)"
    smoke_observation: "tied at 0.767 (n_scen=10)"
    target_lift: 0.00
    target_a1_opensre: 0.77
    rationale: |
      Startup is the highest-scoring stratum for both arms in the smoke
      (0.77). Both arms find image-pull / probe issues reliably from
      pod-state alone. No mechanism in V2 should change this.
    confidence: 0.70

  - id: H_aggregate
    stratum: All
    smoke_observation: "joint smoke +2.5pp; V2 smoke -6.7pp (perf-only slice)"
    target_lift: 0.05
    target_a1_opensre: 0.55
    rationale: |
      Aggregate is dominated by stratum mixing: Admission lift (+20pp on
      ~14% of corpus) + Performance loss (-5pp on ~15%) + Runtime tied
      (~31%) + Startup tied (~19%) → net ~+3 to +5pp. Below paper-ICL
      (0.70) ceiling.
    confidence: 0.55

# --------------------------------------------------------------------------- #
# Expected failures — committed BEFORE results (anti-p-hacking)               #
# --------------------------------------------------------------------------- #
expected_failures:
  - "Performance paired Δ may land between -10pp and 0pp; CI will likely include zero even at n_scen=68 Performance scenarios"
  - "Admission lift at full-N may be smaller than smoke's +33pp (regression to mean from n_scen=7 → n_scen=58 baseline expectation)"
  - "Aggregate a1 will NOT reach paper ICL (0.70) — that's a different ceiling and a different baseline"
  - "Per-cell cost_usd will be 0 (per-cell delta capture is a known TODO); aggregate cost in report.json.cost is authoritative"
  - "Held-out 20% may show smaller lift than optimize-against 80% — that's the generalization signal we're committing to read"
  - "M1 (dependency-traversal) may show no measurable category-specific lift; the bench corpus's DB-shape distribution is narrow"

# --------------------------------------------------------------------------- #
# Anti-overfit gate (BDIL Phase F)                                            #
# --------------------------------------------------------------------------- #
generalization_gate:
  optimize_split_frac: 0.80
  held_out_split_frac: 0.20
  held_out_seed: 42
  ship_threshold: 0.70
  rollback_threshold: 0.30
  abort_threshold:
    held_out_a1_drop: 0.05
  notes: |
    Held-out split was set when the corpus was first scored (cycle
    cloudopsbench-v1-2026-06-05) and is not re-rolled per cycle.
    Inspecting held-out scores during optimization is a contamination
    event and invalidates this cycle.

# --------------------------------------------------------------------------- #
# Stopping rules                                                              #
# --------------------------------------------------------------------------- #
stopping_rules:
  success: |
    Cycle ships if ALL hold:
    (a) Aggregate a1 paired Δ ≥ +0.03 (point estimate), AND
    (b) H_admission: opensre+llm a1 ≥ 0.35 AND paired Δ ≥ +0.10, AND
    (c) H_performance: opensre+llm a1 ≥ 0.40 AND paired Δ ≥ -0.10
        (rules out a hardening of the smoke regression), AND
    (d) generalization_gate.ship_threshold holds, AND
    (e) No expected_failure has been silently dropped from the report.
  abort: |
    Cycle aborts if ANY hold:
    (a) cost_budget_usd exceeded, OR
    (b) opensre_sha drift detected mid-run, OR
    (c) model_versions mismatch caught by pre-flight, OR
    (d) >20% of cells fail with ok=False.
  partial: |
    On clean abort (CostBudgetExceeded), the partial-completion report is
    published with the same integrity gates. Numbers from a partial run
    are NEVER promoted to a baseline; only complete runs are baselines.
  rollback_one_step: |
    If (b) FAILS (Admission lift smaller than +0.10) OR (c) FAILS
    (Performance regresses below -0.10), do NOT keep iterating prompt rules.
    Instead: roll back to V1 (no V2 rule), publish the negative result for
    M2, and pivot to structural changes (planner state, tool sequence) for
    a future cycle.

# --------------------------------------------------------------------------- #
# Contamination check                                                         #
# --------------------------------------------------------------------------- #
contamination_check:
  data_contamination_checked: true
  declared_by: yauhen
  date: 2026-06-11
  evidence: |
    Cloud-OpsBench was published 2026-02-28 (arXiv:2603.00468v1). gpt-4o
    training cutoff predates the publication. No pre-training contamination
    risk. No prompt-level injection of dataset-specific tokens — the
    test_trimmed_prompt_carries_alert_anchored_rule test enforces that
    no service / system names from the corpus appear in the bench prompt.
  caveats: |
    If gpt-4o is updated to a snapshot with a training cutoff after
    2026-02-28, this declaration becomes invalid and the cycle must be
    re-pre-registered.

# --------------------------------------------------------------------------- #
# Conflict-of-interest disclosure                                             #
# --------------------------------------------------------------------------- #
coi_disclosure: |
  This benchmark run was authored, executed, and interpreted by Yauhen
  Bichel, who is also the primary author of opensre. Mitigated by: (a)
  this pre-registration committed before the run, (b) per-stratum
  reporting (seen-shape vs unseen-shape), (c) required negative-results
  section, (d) standardization-by-pinning of every parameter that affects
  results, (e) external replication encouraged via raw artifacts in S3.

# --------------------------------------------------------------------------- #
# Anti-p-hacking discipline                                                   #
# --------------------------------------------------------------------------- #
will_not_do_post_results:
  - "Re-weight metrics to favor the stratum where lift is largest"
  - "Drop or re-bucket cases that hurt the headline number"
  - "Re-run failed cells selectively (re-runs are all-or-nothing per cell × run_index)"
  - "Iterate prompt rules between this pre-registration and the ship decision"
  - "Promote a partial-completion run to a baseline"
  - "Add new mechanisms (M3, M4, ...) post-hoc to explain results"
