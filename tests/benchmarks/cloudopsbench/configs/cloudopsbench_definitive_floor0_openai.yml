# Cloud-OpsBench — definitive run at floor=0 (Path B from floor ablation v2).
#
# Experiment ID: ``exp_definitive_floor0``
#
# Pairs with the prior ``exp_definitive`` (cloudopsbench_definitive_openai.yml)
# which ran the SAME 452 cases × 3 seeds × 2 arms at floor=5. That run showed:
#   seen-shape  Δa1 = −0.028 [−0.065, +0.009]  ns
#   unseen      Δa1 = −0.153 [−0.201, −0.106]  control+ SIG
#   all         Δa1 = −0.073 [−0.103, −0.043]  control+ SIG
#
# The 2026-06-08 ``exp_floor_ablation_v2`` (n=40 same slice, floor=0) showed:
#   seen-shape  Δa1 = +0.042 [−0.056, +0.139]  ns; point estimate FLIPPED positive
#   unseen      Δa1 = −0.125 [−0.271, −0.021]  control+ SIG
#   all         Δa1 = −0.025 [−0.108, +0.050]  ns; aggregate moved from SIG-against to ns
#
# opensre+llm absolute on seen-shape: 0.583 (floor=5) → 0.694 (floor=0). +11pp.
# That's the size of effect we've been chasing. But at n=40 the CI is too wide to
# commit. This experiment confirms (or refutes) the seen-shape lift at full N.
#
# Pre-registered predictions:
#   - Most likely (60%): seen-shape Δa1 stays positive (+0.02 to +0.05) with CI
#     excluding 0. opensre+llm becomes the first arm to measurably beat pure-LLM
#     on this corpus's seen-shape stratum.
#   - Possible (30%): seen-shape Δa1 is within noise of zero. Floor=0 helps but
#     not enough to flip the contrast. opensre+llm draws on seen-shape, still
#     loses on unseen-shape, aggregate stays slightly negative or null.
#   - Less likely (10%): seen-shape Δa1 reverts to floor=5 levels (~−0.02 to
#     −0.03). The n=40 result was sampling noise. Calibration at floor=5 was
#     correct after all.
#
# Pre-registered actions per outcome:
#   - SIG positive on seen-shape AND aggregate non-significant → ship floor=0
#     as the new default in bench_agent.py. Publish the seen-shape win.
#   - Seen-shape contrast CI includes 0 → floor=0 is calibration improvement
#     but not a structural win. Set _DEFAULT_MIN_TOOL_CALLS=0 anyway (it's not
#     hurting on seen-shape; helps slightly on aggregate); move to trimmed-prompt
#     experiment next.
#   - Reverts to floor=5 numbers → don't change the default; document the n=40
#     ablation as a positive-but-not-significant result; move on.

benchmark: cloudopsbench

modes:
  - opensre+llm
  - llm_alone_pure

llms:
  - gpt-4o

model_versions:
  gpt-4o: gpt-4o-2024-11-20

runs_per_case: 3

# workers=4 — same as exp_definitive for fair wall-time comparison.
workers: 4

# $100 covers projected $80 + 25% headroom (mirrors exp_definitive).
cost_budget_usd: 100.0
seed: 42

output_dir: .bench-results/cloudopsbench_definitive_floor0_openai/

pre_registration_path: tests/benchmarks/cloudopsbench/configs/preregistrations/cloudopsbench_v1.yml

filters:
  # Full corpus, both shape strata — identical to exp_definitive so the floor
  # is the only variable that changed.
  seen_shape: [true, false]
  systems: []
  fault_categories: []

# The lever this experiment is testing. The CLI override at runtime sets
# BenchInvestigationAgent.MIN_TOOL_CALLS = 0 before the bench loop starts;
# the agent's _should_accept_conclusion(evidence_count=0, ...) returns True
# immediately, so the LLM stops when it decides.
min_tool_calls: 0

report_formats:
  - json
  - markdown
  - html
