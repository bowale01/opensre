# Cloud-OpsBench — structured-outputs smoke at n=100 (OpenAI predictor).
#
# Experiment ID: ``exp_structured_outputs`` (extended smoke phase)
#
# Why n=100 (and not n=40 like the prior smoke):
#   The 2026-06-10T11:53:23Z n=40 smoke produced strong supporting evidence
#   for the structured-outputs mechanism (paired Δ +0.10 [+0.03, +0.18];
#   mysql_invalid_port → db_connection_exhaustion confusion ~92% reduction;
#   Runtime A@1 +12pp; first crossover above paper-ICL at 0.71 vs 0.70) BUT
#   the pre-registered smoke gate (OBJECT_HIT_RC_MISS share drops ≥3pp,
#   24% → ≤21%) failed by ~1 cell: share landed at 22.9% (8 of 35 losses).
#
#   At n=40 with ~35 losses per arm, a 3pp share change corresponds to
#   ~1.05 cells — exactly the noise floor. The gate was poorly sized for
#   the smoke. n=100 (900 cells across three arms × 3 runs) gives the same
#   3pp threshold ~3-cell resolution — unambiguously testable.
#
#   The pre-reg gate is intact; only the sample size changes. No pre-reg
#   amendment is required.
#
# Mechanism: OpenAI's ``response_format`` enforces the closed-vocabulary
# ``root_cause`` and ``fault_taxonomy`` enums at the API layer. The LLM
# literally cannot emit out-of-enum tokens, so adjacent-vocabulary failure
# cells (e.g. ``mysql_invalid_port`` → ``db_connection_exhaustion``) are
# blocked at the sampler, not at the parser.
#
# Run:
#   cd opensre && set -a && source .env && set +a
#   uv run python -m tests.benchmarks._framework.cli \
#     run tests/benchmarks/cloudopsbench/configs/cloudopsbench_structured_outputs_smoke_100_openai.yml --dev
#
# Cost: ~$20-25. The 2026-06-10 n=40 smoke spent $8.30 on 360 cells, so
# 900 cells extrapolates to ~$20.75. The $25 budget keeps headroom.
# Wall time: ~1h Fargate at workers=1.
#
# Pre-registered decision rule for advancing to full-N (unchanged from
# exp_structured_outputs_v1.yml):
#   OBJECT_HIT_RC_MISS share of opensre+llm losses drops ≥3pp vs the
#   baseline (24% → ≤21%). At n=100 this threshold corresponds to
#   ~3 cells — resolvable above the noise floor.

benchmark: cloudopsbench

modes:
  - opensre+llm
  - llm_alone
  - llm_alone_pure

llms:
  - gpt-4o

model_versions:
  gpt-4o: gpt-4o-2024-11-20

runs_per_case: 3
workers: 1
cost_budget_usd: 25.0
seed: 42

output_dir: .bench-results/cloudopsbench_structured_outputs_smoke_100_openai/

pre_registration_path: tests/benchmarks/cloudopsbench/configs/preregistrations/exp_structured_outputs_v1.yml

filters:
  # 100 seeded cases — only the limit changes vs the n=40 smoke. Same
  # ``seed: 42`` + ``seen_shape: [true, false]`` => deterministic superset
  # of the prior 40 cases plus 60 additional seeded scenarios.
  limit: 100
  seen_shape: [true, false]
  systems: []
  fault_categories: []

# Floor=0 + trimmed prompt — matches the current bench default established
# by the post-vocab-fix run. The predictor variant is the only change here.
min_tool_calls: 0
agent_variant: trimmed_prompt

# The lever this experiment is testing.
predictor_variant: structured

report_formats:
  - json
  - markdown
