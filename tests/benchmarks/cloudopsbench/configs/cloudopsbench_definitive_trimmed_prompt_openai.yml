# Cloud-OpsBench — definitive run at floor=0 + trimmed prompt (full N).
#
# Experiment ID: ``exp_definitive_trimmed_prompt``
#
# Mirrors cloudopsbench_definitive_floor0_openai.yml exactly except for the
# trimmed-prompt agent variant. Single variable changed vs the prior full-N
# floor=0 baseline so the contrast is interpretable.
#
# Pairs with three prior runs:
#   exp_definitive            (full prompt, floor=5, n=353): seen Δa1 = −0.028 ns, all = −0.073 SIG
#   exp_definitive_floor0     (full prompt, floor=0, n=353): seen Δa1 = +0.003 ns, all = −0.048 SIG
#   exp_trimmed_prompt        (trimmed,    floor=0, n=40 ): seen Δa1 = +0.028 ns, all = −0.017 ns
#
# The 2026-06-08 small-N trimmed-prompt run hinted that:
#   (1) seen-shape Δa1 stays nominally positive (+0.028)
#   (2) unseen-shape gap narrowed from −0.125 SIG → −0.083 ns — FIRST time
#       unseen-shape CI included zero
#   (3) opensre+llm unseen-shape a1 jumped +12.5pp absolute (0.521 → 0.646)
#
# But n=40 has half-width ±0.10. Need n=452 (paired ~353 in practice with
# Fargate exit pattern) to tighten to ±0.04 and resolve whether the unseen
# narrowing is real or sampling noise (llm_alone_pure also lifted +8.3pp
# unseen between the two n=40 runs — could be all noise).
#
# Pre-registered predictions:
#   - Most likely (45%): seen-shape Δa1 lands +0.01 to +0.03 with CI tighter
#     than n=40 but still including 0; unseen-shape gap stays SIG against
#     (−0.08 to −0.12); aggregate stays mildly SIG against (−0.02 to −0.05).
#     Verdict: trimmed prompt helps marginally but doesn't flip the contrast.
#   - Possible (30%): seen-shape Δa1 excludes 0 with at least +0.02 lift —
#     first measurable opensre+llm win on a stratum. unseen-shape gap narrows
#     materially (−0.05 to −0.10) but stays SIG against. Aggregate ns.
#     Verdict: trimmed-prompt is a real lever; promote to bench default.
#   - Less likely (20%): seen-shape Δa1 reverts to floor=0 baseline (+0.003).
#     The n=40 lift was noise. unseen-shape gap returns to −0.125 to −0.15.
#     Verdict: prompt structure isn't the real lever.
#   - Tail (5%): trimmed prompt regresses (Δa1 < −0.02 on seen). Verdict:
#     strips signal opensre's structure was providing; revert.
#
# Pre-registered actions per outcome:
#   - "Helps marginally" (45%): document as honest small improvement, change
#     trimmed prompt to the bench default (mirror the floor=0 default change),
#     publish the corpus-limit story honestly. No more bench iteration without
#     architectural change.
#   - "Real lever" (30%): set _DEFAULT_AGENT_VARIANT = "trimmed_prompt" as the
#     bench default. Move to predictor-prompt ablation (drop AUTHORITATIVE) to
#     stack improvements.
#   - "Reverts to baseline" (20%): n=40 result was sampling noise. Keep the
#     full opensre prompt. Investigate why the n=40 result misleadingly showed
#     improvement (likely interaction with the specific 40 cases selected).
#   - "Regresses" (5%): revert the trimmed-prompt variant. Document.
#
# Run:
#   cd opensre && set -a && source .env && set +a
#   uv run python -m tests.benchmarks._framework.cli \
#     run tests/benchmarks/cloudopsbench/configs/cloudopsbench_definitive_trimmed_prompt_openai.yml --dev
#
# Cost: ~$34 (mirrors prior definitive runs at the same N and arms).
# Wall time: ~2.5-3h Fargate at workers=4.

benchmark: cloudopsbench

modes:
  - opensre+llm
  - llm_alone
  - llm_alone_pure

llms:
  - gpt-4o

model_versions:
  gpt-4o: gpt-4o-2024-11-20

runs_per_case: 3

# workers=4 — matches exp_definitive and exp_definitive_floor0.
workers: 4

cost_budget_usd: 100.0
seed: 42

output_dir: .bench-results/cloudopsbench_definitive_trimmed_prompt_openai/

pre_registration_path: tests/benchmarks/cloudopsbench/configs/preregistrations/cloudopsbench_v1.yml

filters:
  # Full corpus, both shape strata — identical to exp_definitive_floor0.
  seen_shape: [true, false]
  systems: []
  fault_categories: []

# Same floor as exp_definitive_floor0 — the prompt is the only variable.
min_tool_calls: 0

# The lever this experiment is testing at full N.
agent_variant: trimmed_prompt

report_formats:
  - json
  - markdown
  - html
