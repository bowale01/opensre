# Cloud-OpsBench — trimmed prompt experiment (gpt-4o, 40-case slice).
#
# Experiment ID: ``exp_trimmed_prompt``
#
# Hypothesis (from 2026-06-08 loss-mode diagnostic on exp_definitive_floor0,
# n=353 paired scenarios):
#   - Object identification is statistically tied between opensre+llm and
#     llm_alone_pure (object_a1 ≈ 0.75 both arms).
#   - 60% of opensre+llm losses are PREDICTOR DRIFT: opensre's investigation
#     correctly identifies fault_object but the predictor's rank-1 root_cause
#     is an adjacent token to the truth — e.g. ``timing`` instead of
#     ``protocol``, ``cpu_quota`` instead of ``pod_quota``,
#     ``image_registry_dns_failure`` instead of ``incorrect_image_reference``.
#   - The predictor is faithful to its input; the wrong tokens come from
#     opensre's investigation TEXT itself, which leans on adjacent
#     vocabulary the full prompt's hedging + multi-stage scaffolding biases
#     it toward.
#
# This experiment tests whether trimming opensre's bench system prompt to a
# minimal-but-cited form (drop hedging-by-default language, drop multi-stage
# planner directives, drop validation-of-validation; keep tool-output
# citation requirement, keep structured component + root_cause output)
# reduces the adjacent-token bias.
#
# Bench-only — production opensre's prompt is unchanged. The trimmed prompt
# is selected by ``agent_variant: trimmed_prompt``; the adapter's
# investigation_agent_class is patched to BenchInvestigationAgentTrimmedPrompt
# at CLI startup for this run only.
#
# Pre-registered predictions:
#   - Most likely (50%): seen-shape Δa1 improves +0.02 to +0.04 over floor=0
#     full-N (currently +0.003). opensre+llm becomes nominally positive on
#     seen-shape with a CI that still includes zero at n=40.
#   - Possible (35%): seen-shape Δa1 within noise of floor=0. The prompt
#     structure isn't the dominant bias source; some other layer (predictor
#     prompt, evidence summary format) is.
#   - Less likely (15%): seen-shape Δa1 regresses by ≥0.02. The trimmed
#     prompt strips signal opensre's structure was providing.
#
# Decision rule (committed BEFORE seeing the result):
#   - Seen-shape Δa1 ≥ +0.02 with CI tightening relative to floor=0 → promote
#     to full-N run at trimmed prompt (next experiment, ~$80).
#   - Seen-shape Δa1 within noise of floor=0 (±0.02) → prompt structure is not
#     the dominant bias. Next layer to test: predictor prompt (drop the
#     AUTHORITATIVE framing) — distinct hypothesis, $4 to test.
#   - Seen-shape Δa1 regresses → keep the full opensre prompt as the bench
#     default. The trimmed variant strips load-bearing signal.
#
# Run (BENCH_MIN_TOOL_CALLS env var ignored — floor is config-driven):
#   cd opensre && set -a && source .env && set +a
#   uv run python -m tests.benchmarks._framework.cli \
#     run tests/benchmarks/cloudopsbench/configs/cloudopsbench_trimmed_prompt_openai.yml --dev
#
# Cost: 40 cases × 1 LLM × 3 runs × 2 modes = 240 cells ≈ $4 (gpt-4o).
# Wall time: ~1h at workers=1.

benchmark: cloudopsbench

modes:
  - opensre+llm
  - llm_alone_pure

llms:
  - gpt-4o

model_versions:
  gpt-4o: gpt-4o-2024-11-20

runs_per_case: 3
workers: 1
cost_budget_usd: 25.0
seed: 42

output_dir: .bench-results/cloudopsbench_trimmed_prompt_openai/

pre_registration_path: tests/benchmarks/cloudopsbench/configs/preregistrations/cloudopsbench_v1.yml

filters:
  # 40 seeded cases — identical slice to fixa baseline / floor_ablation_v2 so
  # the prompt change is the only variable.
  limit: 40
  seen_shape: [true, false]
  systems: []
  fault_categories: []

# Floor=0 — matches the prior exp_definitive_floor0 baseline. The trimmed
# prompt experiment isolates the PROMPT change.
min_tool_calls: 0

# The lever this experiment is testing. Swaps the adapter's
# investigation_agent_class to BenchInvestigationAgentTrimmedPrompt for this
# run only; production opensre prompt unchanged.
agent_variant: trimmed_prompt

report_formats:
  - json
  - markdown
