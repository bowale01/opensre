repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--no-fix]
        files: ^(config|core|gateway|integrations|platform|surfaces|tools|tests)/
      - id: ruff-format
        args: [--check]
        files: ^(config|core|gateway|integrations|platform|surfaces|tools|tests)/
